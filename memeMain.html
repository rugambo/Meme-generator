<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meme Generator</title>
    <link rel="stylesheet" href="psychodelicVerTwo.css">
    <script src="memeJava.js"></script>
</head>
<body>
    <h1>Meme Generator</h1>
    <form id="generator">
        <label for="user-img">User Image:</label>
        <input 
            type="text"
            id="user-img"
            placeholder="User Image"
            required
        >
        <label for="top-text">Meme Top Text:</label>
        <input 
            type="text"
            id="top-text"
            placeholder="Meme Top Text"
            required
        >
        <label for="bottom-text">Meme Bottom Text:</label>
        <input 
            type="text"
            id="bottom-text"
            placeholder="Meme Bottom Text"
            required
        >
        <!-- <label for="flip-img">Flip Image</label>
        <input 
            type="checkbox" 
            name="flip-img" 
            id="flip-img"
        > -->
        <button type="submit">Generate Meme</button>
    </form>
    <div id="meme-container">Generated Memes</div>
</body>
</html>
